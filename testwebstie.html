<!DOCTYPE html>
<html lang="en">
    <head>
        <script>
            function setCookie(c_name, value) { 
                document.cookie = c_name + "=" + c_value;
            }
        </script>
    </head>
    <body>
        <script>
            let test = "test";
            let test2 = 1;
        </script>
        <button onclick="setCookie(test, test2)">test</button>
    </body>
    
</html>
