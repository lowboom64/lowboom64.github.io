        <!--how the timetable is saved-->
        <script>
            let cookies = document.cookie.split(';');
            function save() {
                let cookiebaker
                const tahitoono = ["null","tahi","rua","toru","wha","rima","ono"];
                const onetosix = ["null","1","2","3","4","5","6"];
                let numb1 = 1;
                let numb2 = 1;
                let counter = 0;
                for (let i = 0; i < 30; i++) {
                    cookiebaker = document.getElementById(tahitoono[numb1] + onetosix[numb2]).value;
                    document.cookie = tahitoono[numb1] + onetosix[numb2] + "=" + cookiebaker + ";";
                    numb1++
                    counter++
                    if (numb1 == 7) {
                        numb1 = 1;
                    }
                    if (counter == 6) {
                        counter = 0;
                        numb2++
                        if (numb2 == 7) {
                            i = 30
                        }
                    }
                }
            }
        </script>

        <!--day cycleing script-->
        <script>
            const days = ["null", "Tahi", "Rua", "Toru", "Whā", "Rima", "Ono", "null"];
            // this is PAIN
            // so much interal screaming
            // i think i got this to work but as i say that there will likely be a bug and ill have to redo it all
            var old = new Date("2024-02-11 00:00")
            var today = new Date();
            console.log(Math.floor((today - old) / 1000 / 60 / 60 / 24 ) + " day(s) ago");
            var daysago = (Math.floor((today - old) / 1000 / 60 / 60 / 24 ));
            let weekends = (Math.floor(daysago / 7));
            let numb = 1;
            let a = 1;
            while (a == 1) {
                if (weekends == 0){
                    break;
                }
                weekends = weekends - 1;
                daysago = daysago - 2;
            }
            // update on holladays
            daysago = daysago - 0;
            numb = numb - 1;
            for (let i = 0; i < daysago; i++) {
                numb = numb + 1;
                if (numb == 7) {
                    numb = 1;
                }
            }
            // this is where the PAIN ends
            let day = days[numb];
            const plus = document.getElementById('plus');
            const mins = document.getElementById('mins');
            const h1 = document.getElementById('displayDay');
            h1.innerHTML = '<h1>'+day+'</h1>';
            function add() {
                numb++;
                if (numb == 7){
                    numb = 1
                }
                let day = days[numb];
                h1.innerHTML = '<h1>'+day+'</h1>';
            }
            function sub() {
                numb--;
                if (numb == 0){
                    numb = 6;
                }
                let day = days[numb];
                h1.innerHTML = '<h1>'+day+'</h1>';
            }
            plus.addEventListener('click', add);
            mins.addEventListener('click', sub);
        </script>
        <!--load timetable script-->
        <script>
            let cookieloader;
            const tahitoono2 = ["null","tahi","rua","toru","wha","rima","ono"];
            const onetosix2 = ["null","1","2","3","4","5","6"];
            let numb3 = 1;
            let numb4 = 1;
            let counter2 = 1;
            let i = 1;
            for (let i = 1; i < 30; i++) {
                cookieloader = cookies[i].replace(tahitoono2[numb3] + onetosix2[numb4] + "=","");
                document.getElementById(tahitoono2[numb3] + onetosix2[numb4] + "=","").value = cookieloader;
                numb3++
                counter2++
                i++
                if (numb3 == 7) {
                    numb3 = 1;
                }
                if (counter2 == 6) {
                    counter2 = 1
                    numb4++
                }
            }
        </script>
